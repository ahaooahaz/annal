name: ShellCheck

on:
  push:
    paths:
      - 'scripts/linux/**'
      - '.github/workflows/shellcheck.yml'
  pull_request:
    paths:
      - 'scripts/linux/**'
      - '.github/workflows/shellcheck.yml'

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: './scripts/linux'
